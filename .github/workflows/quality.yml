name: Web quality

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/quality.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/quality.yml'

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: TypeScript check
        run: npm run check
      - name: Music engine contract
        run: npm run music:contract
      - name: Production build
        run: npm run build
