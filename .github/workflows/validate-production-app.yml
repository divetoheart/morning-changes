name: Validate production app

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/validate-production-app.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/validate-production-app.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package.json
      - run: npm install --no-audit --no-fund
      - run: npm run check
      - run: npm run build
