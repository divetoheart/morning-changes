name: Deploy Morning Changes

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Morning Changes application
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist _guide
          mkdir -p dist _guide
          cp -R morning-changes-app/. dist/
          rm -f dist/README.md

          python3 - <<'PY'
          from pathlib import Path

          route_template = '''<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
            <meta name="theme-color" content="#0b0a08" />
            <title>Morning Changes · Guitar Practice</title>
            <link rel="stylesheet" href="../assets/app.css?v=20260630N" />
            <link rel="stylesheet" href="../assets/mobile-polish.css?v=20260630N" />
          </head>
          <body data-route="__ROUTE__">
            <div id="app"></div>
            <script src="../assets/content.js?v=20260630N"></script>
            <script src="../assets/app.js?v=20260630N"></script>
            <script src="../assets/ui-polish.js?v=20260630N"></script>
          </body>
          </html>'''
          for route in ['learn', 'paths', 'after-hours', 'tools', 'progress', 'daily']:
              target = Path('dist') / route
              target.mkdir(parents=True, exist_ok=True)
              (target / 'index.html').write_text(route_template.replace('__ROUTE__', route))

          redirect = '''<!doctype html><html><head><meta http-equiv="refresh" content="0; url=../"><script>location.replace('../')</script></head><body></body></html>'''
          legacy = Path('dist/morning-changes')
          legacy.mkdir(parents=True, exist_ok=True)
          (legacy / 'index.html').write_text(redirect)

          app_js = Path('dist/assets/app.js')
          js = app_js.read_text()
          old_routes = "  const knownRoutes = ['learn','paths','after-hours','tools','progress','daily'];\n"
          old_index = "  const routeIndex = parts.findIndex(part => knownRoutes.includes(part));"
          new_index = "  const routeIndex = route === 'home' ? -1 : parts.lastIndexOf(route);"
          if old_routes not in js or old_index not in js:
              raise RuntimeError('Morning Changes route patch did not find its expected source lines')
          js = js.replace(old_routes, '').replace(old_index, new_index)
          app_js.write_text(js)
          PY

      - name: Preserve and catalog After Hours standards
        shell: bash
        run: |
          set -euo pipefail
          unzip -o "Autumn Leaves Jazz Guide.zip" -d _guide

          for target in dist/after-hours/autumn-leaves dist/standards/autumn-leaves; do
            mkdir -p "$target/arpeggios"
            cp -R _guide/. "$target/"
            cp standards/autumn-leaves/arpeggio-playalong.html "$target/arpeggios/index.html"
            sed -i 's|href="../../"|href="../../../"|' "$target/arpeggios/index.html"
          done

          python3 - <<'PY'
          from pathlib import Path
          for path in [
              Path('dist/after-hours/autumn-leaves/index.html'),
              Path('dist/standards/autumn-leaves/index.html'),
          ]:
              html = path.read_text()
              start = html.find('<script data-pplx-inline-edit>')
              if start != -1:
                  end = html.find('</script>', start)
                  if end != -1:
                      html = html[:start] + html[end + len('</script>'):]
              launch = '<section style="margin:28px auto;max-width:720px;padding:0 18px;"><a href="./arpeggios/" style="display:block;border:1px solid #6e512b;background:#17110b;color:#f4eee5;text-decoration:none;border-radius:28px;padding:24px;"><span style="display:block;color:#d7a05b;font-size:11px;letter-spacing:4px;text-transform:uppercase;">Play Along</span><strong style="display:block;font-family:Georgia,serif;font-size:29px;margin-top:8px;">Autumn Leaves Arpeggios →</strong><span style="display:block;margin-top:8px;color:#c4b7a8;line-height:1.5;">Verified chord tones, movable fretboard windows, and the A section in chronological bar order.</span></a></section>'
              nav = '<section style="margin:28px auto;max-width:720px;padding:0 18px;"><a href="../../" style="display:block;border:1px solid #3d3026;background:#15110e;color:#f4eee5;text-decoration:none;border-radius:28px;padding:22px;"><span style="display:block;color:#d7a05b;font-size:11px;letter-spacing:4px;text-transform:uppercase;">Morning Changes</span><strong style="display:block;font-family:Georgia,serif;font-size:24px;margin-top:8px;">← Daily launchpad</strong></a></section>'
              marker = '<footer style="text-align:center;padding:28px 0 44px;color:#8f8478;font-size:11px;letter-spacing:4px;text-transform:uppercase;background:#0b0907;">After Hours · Standards Catalog · Build 2026.06.30-N</footer>'
              html = html.replace('</body>', launch + nav + marker + '\n</body>')
              path.write_text(html)
          PY

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
