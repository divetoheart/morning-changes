name: Deploy Morning Changes

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build production React application
        working-directory: apps/web
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          cp -R apps/web/dist/. dist/

          # Old public After Hours URLs now land inside the shared React application.
          for path in dist/after-hours/autumn-leaves dist/after-hours/autumn-leaves/arpeggios; do
            mkdir -p "$path"
            cat > "$path/index.html" <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
              <meta http-equiv="refresh" content="0; url=../../#/after-hours/autumn-leaves" />
              <title>Morning Changes · After Hours</title>
              <script>location.replace('../../#/after-hours/autumn-leaves');</script>
            </head>
            <body></body>
          </html>
          HTML
          done

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
