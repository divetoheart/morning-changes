name: Deploy After Hours Guide

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare uploaded guide
        run: |
          rm -rf dist
          mkdir -p dist
          unzip -o "Autumn Leaves Jazz Guide.zip" -d dist

      - name: Clean exported HTML and add build marker
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('dist/index.html')
          html = path.read_text()
          start = html.find('<script data-pplx-inline-edit>')
          if start != -1:
              end = html.find('</script>', start)
              if end != -1:
                  html = html[:start] + html[end + len('</script>'):]
          marker = '<footer style="text-align:center;padding:28px 0 44px;color:#8f8478;font-size:11px;letter-spacing:4px;text-transform:uppercase;background:#0b0907;">After Hours · v0.2.0 · Build 2026.05.20-C</footer>'
          html = html.replace('</body>', marker + '\n</body>')
          path.write_text(html)
          PY

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
