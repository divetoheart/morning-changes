name: Deploy Morning Changes

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build production React application
        working-directory: apps/web
        env:
          VITE_APP_COMMIT_SHA: ${{ github.sha }}
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist _guide
          mkdir -p dist _guide
          cp -R apps/web/dist/. dist/

      - name: Package original After Hours guide
        shell: bash
        run: |
          set -euo pipefail
          unzip -o "Autumn Leaves Jazz Guide.zip" -d _guide

          python3 - <<'PY'
          import re
          from pathlib import Path

          assets = Path('_guide/assets')
          candidates = []
          for bundle in assets.glob('index-*.js'):
              source = bundle.read_text(errors='replace')
              if 'aint-misbehavin' in source:
                  candidates.append((bundle, source))

          if len(candidates) > 1:
              names = ', '.join(bundle.name for bundle, _ in candidates)
              raise RuntimeError(f'Expected one guide bundle containing the optional standard, found: {names}')

          if candidates:
              bundle, source = candidates[0]
              cleaned, count = re.subn(
                  r'\$x=\{id:"aint-misbehavin".*?co=\[Fx,\$x,Vx\]',
                  'co=[Fx]',
                  source,
                  flags=re.S,
              )
              if count > 1:
                  raise RuntimeError(f'Expected at most one optional-standard bundle block in {bundle.name}, found {count}')
              if count == 1:
                  bundle.write_text(cleaned)
                  print(f'Removed optional standard from {bundle.name}')
              else:
                  print(f'Optional-standard reference found in {bundle.name}, but no removable block matched; preserving original bundle')
          else:
              print('No optional-standard bundle found; preserving guide assets unchanged')
          PY

          mkdir -p dist/after-hours/autumn-leaves/guide/arpeggios
          cp -R _guide/. dist/after-hours/autumn-leaves/guide/
          mkdir -p dist/assets
          cp -R -n _guide/assets/. dist/assets/

          cp standards/autumn-leaves/arpeggio-playalong.html dist/after-hours/autumn-leaves/guide/arpeggios/index.html
          sed -i 's|href="../../"|href="../../../#\/"|' dist/after-hours/autumn-leaves/guide/arpeggios/index.html

          python3 - <<'PY'
          from pathlib import Path

          path = Path('dist/after-hours/autumn-leaves/guide/index.html')
          html = path.read_text()
          html = html.replace('href="/assets/', 'href="./assets/')
          html = html.replace('src="/assets/', 'src="./assets/')
          html = html.replace("href='/assets/", "href='./assets/")
          html = html.replace("src='/assets/", "src='./assets/")

          start = html.find('<script data-pplx-inline-edit>')
          if start != -1:
              end = html.find('</script>', start)
              if end != -1:
                  html = html[:start] + html[end + len('</script>'):]

          launch = '<section style="margin:28px auto;max-width:720px;padding:0 18px;"><a href="./arpeggios/" style="display:block;border:1px solid #6e512b;background:#17110b;color:#f4eee5;text-decoration:none;border-radius:28px;padding:24px;"><span style="display:block;color:#d7a05b;font-size:11px;letter-spacing:4px;text-transform:uppercase;">Play Along</span><strong style="display:block;font-family:Georgia,serif;font-size:29px;margin-top:8px;">Autumn Leaves Arpeggios →</strong><span style="display:block;margin-top:8px;color:#c4b7a8;line-height:1.5;">Verified chord tones, movable fretboard windows, and the A section in chronological bar order.</span></a></section>'
          html = html.replace('</body>', launch + '\n</body>')
          path.write_text(html)
          PY

          cat > dist/after-hours/autumn-leaves/index.html <<'HTML'
          <!doctype html>
          <html lang="en"><head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
            <meta http-equiv="refresh" content="0; url=../../#/after-hours/autumn-leaves" />
            <title>Morning Changes · After Hours</title>
            <script>location.replace('../../#/after-hours/autumn-leaves');</script>
          </head><body></body></html>
          HTML

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
